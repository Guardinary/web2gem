name: Upstream Sync

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync-latest-from-upstream:
    name: Sync latest commits from upstream
    if: ${{ github.event.repository.fork }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target fork
        uses: actions/checkout@v4
        with:
          ref: gemini-account-pool
          fetch-depth: 0

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: Guardinary/web2gem
          upstream_sync_branch: gemini-account-pool
          target_sync_branch: gemini-account-pool
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_pull_args: "--ff-only"
          test_mode: false

      - name: Report synchronization result
        shell: bash
        run: |
          if [[ "${{ steps.sync.outputs.has_new_commits }}" == "true" ]]; then
            echo "Upstream updates were pushed to gemini-account-pool." >> "$GITHUB_STEP_SUMMARY"
            echo "The connected Cloudflare Workers Build should start from this push." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "The fork is already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi
