name: Release to Aliyun CR

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "版本类型"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: versioned-release
  cancel-in-progress: false

jobs:
  prepare:
    uses: ./.github/workflows/reusable-versioned-release.yml
    with:
      version_type: ${{ github.event.inputs.version_type }}
    secrets: inherit

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release revision
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.revision_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/web2gem:${{ needs.prepare.outputs.new_tag }}
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/web2gem:${{ needs.prepare.outputs.new_version }}
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}/web2gem:latest
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.new_version }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.revision_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
